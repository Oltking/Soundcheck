# Render Blueprint — the full live BFF + agents host.
# The Vercel frontend reaches this service SERVER-SIDE only: set BFF_INTERNAL_URL
# (this service's https URL) and a matching INTERNAL_API_KEY in the Vercel project.
services:
  - type: web
    name: soundcheck-bff
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # always-on; the free tier sleeps and would kill live runs
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # shared secret the Vercel proxy must send on every request. WITHOUT it the
      # BFF is open to the world — set it, and set the SAME value on Vercel.
      - key: INTERNAL_API_KEY
        sync: false
      # the Vercel frontend origin(s), comma-separated — for CORS (defensive;
      # the browser never hits this service directly).
      - key: ALLOWED_ORIGINS
        sync: false
      # model lanes
      - key: AIMLAPI_API_KEY
        sync: false
      - key: FEATHERLESS_API_KEY
        sync: false
      # PRs
      - key: GITHUB_TOKEN
        sync: false
      # Band platform
      - key: THENVOI_REST_URL
        sync: false
      - key: THENVOI_WS_URL
        sync: false
      # full contents of agent_config.yaml (the agents' credentials)
      - key: AGENT_CONFIG_YAML
        sync: false
